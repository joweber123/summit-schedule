    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: var(--bg);
      color: #333;
      line-height: 1.5;
      padding: 20px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 30px;
      padding: 25px;
      background: var(--header-bg);
      color: var(--header-text);
      border-radius: 12px;
    }

    .page-header h1 {
      font-size: 1.6em;
      margin-bottom: 4px;
    }

    .page-header .subtitle {
      font-size: 1.1em;
      opacity: 0.85;
    }

    .page-header .draft {
      font-size: 0.85em;
      opacity: 0.6;
      margin-top: 8px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      justify-content: center;
      margin-bottom: 24px;
      padding: 12px 20px;
      background: var(--card-bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.85em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .month-section {
      margin-bottom: 28px;
      background: var(--card-bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: var(--header-bg);
      color: var(--header-text);
    }

    .month-header h2 {
      font-size: 1.25em;
    }

    .school-days {
      font-size: 0.85em;
      opacity: 0.8;
      background: rgba(255,255,255,0.15);
      padding: 3px 10px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 8px 10px;
      text-align: left;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      background: #f8f8f8;
      border-bottom: 2px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #f9f9f9;
    }

    td {
      padding: 7px 10px;
      font-size: 0.9em;
      vertical-align: top;
    }

    .col-date {
      width: 40px;
      font-weight: 600;
      text-align: center;
    }

    .col-day {
      width: 36px;
      text-align: center;
      font-weight: 500;
    }

    .col-jp, .col-en {
      width: calc((100% - 76px) / 2);
    }

    .sat { color: var(--saturday); }
    .sun { color: var(--sunday); }
    .holiday-text { color: var(--holiday); font-weight: 500; }

    .row-holiday { background: var(--holiday-bg) !important; }
    .row-closed { background: var(--closed-bg) !important; }
    .row-break { background: var(--break-bg) !important; }
    .row-summit { background: var(--summit-bg) !important; }

    .tag {
      display: inline-block;
      font-size: 0.7em;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 4px;
      vertical-align: middle;
    }

    .tag-e { background: #e8f5e9; color: var(--event-e); }
    .tag-s { background: #f3e5f5; color: var(--event-s); }
    .tag-es { background: #fff3e0; color: var(--event-es); }
    .tag-closed { background: #eeeeee; color: var(--closed); }
    .tag-break { background: #fff8e1; color: var(--planned); }

    .no-event { color: #bbb; font-style: italic; }

    .year-summary {
      text-align: center;
      margin-top: 20px;
      padding: 16px;
      background: var(--card-bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.9em;
    }

    @media (max-width: 600px) {
      body { padding: 10px; }
      .page-header h1 { font-size: 1.2em; }
      td { padding: 5px 6px; font-size: 0.82em; }
      .legend { font-size: 0.78em; gap: 8px 16px; }
    }

    @media print {
      .month-section { break-inside: avoid; }
      body { padding: 0; background: #fff; }
    }
  </style>
</head>

// Mark days during long breaks as visually "on break"
const breakPeriods = [
  { label_jp: "夏期休業", label_en: "Summer Break", startMonth: "July 2026", startDay: 24, endMonth: "August 2026", endDay: 23 },
  { label_jp: "冬期休業", label_en: "Winter Break", startMonth: "December 2026", startDay: 25, endMonth: "January 2027", endDay: 6 },
  { label_jp: "春期休業", label_en: "Spring Break", startMonth: "March 2027", startDay: 18, endMonth: "March 2027", endDay: 31 },
];

for (const bp of breakPeriods) {
  let inRange = false;
  for (const month of schedule) {
    if (month.month_en === bp.startMonth) inRange = true;
    if (!inRange) continue;
    for (const day of month.days) {
      const isStart = month.month_en === bp.startMonth && day.d >= bp.startDay;
      const isEnd = month.month_en === bp.endMonth && day.d <= bp.endDay;
      const isMid = month.month_en !== bp.startMonth && month.month_en !== bp.endMonth;
      const inStartMonth = month.month_en === bp.startMonth && month.month_en === bp.endMonth
        ? (day.d >= bp.startDay && day.d <= bp.endDay) : isStart;
      const match = (bp.startMonth === bp.endMonth) ? inStartMonth : (isStart || isEnd || isMid);
      if (match) {
        day.onBreak = { jp: bp.label_jp, en: bp.label_en };
      }
    }
    if (month.month_en === bp.endMonth) break;
  }
}

function getTagClass(tag) {
  if (!tag) return '';
  const t = tag.toUpperCase();
  if (t === 'ES') return 'tag-es';
  if (t === 'E') return 'tag-e';
  if (t === 'S') return 'tag-s';
  return '';
}

function getDayClass(dow) {
  if (dow === 'Sat') return 'sat';
  if (dow === 'Sun') return 'sun';
  return '';
}

function getRowClass(day) {
  if (day.holiday && !day.onBreak) return 'row-holiday';
  if (day.onBreak || day.closed) return 'row-closed';
  if (day.events) {
    for (const e of day.events) {
      if (e.type === 'break') return 'row-break';
      if (e.type === 'summit') return 'row-summit';
    }
  }
  return '';
}

function renderEvents(events, lang) {
  if (!events || events.length === 0) return '';
  return events.map(e => {
    let html = '';
    if (e.tag) {
      html += `<span class="tag ${getTagClass(e.tag)}">${e.tag}</span>`;
    } else if (e.type === 'planned') {
      html += `<span class="tag tag-break">休</span>`;
    } else if (e.type === 'summit') {
      html += `<span class="tag tag-e">SW</span>`;
    }
    html += lang === 'jp' ? e.jp : e.en;
    return html;
  }).join('<br>');
}

function render() {
  const app = document.getElementById('app');
  let html = '';

  for (const month of schedule) {
    html += `<div class="month-section">`;
    html += `<div class="month-header">
      <h2>${month.month_jp} / ${month.month_en}</h2>
      <span class="school-days">${month.school_days_jp} / ${month.school_days}</span>
    </div>`;
    html += `<table>
      <thead>
        <tr>
          <th class="col-date">日 Date</th>
          <th class="col-day">曜 Day</th>
          <th class="col-jp">行事（日本語）Events (Japanese)</th>
          <th class="col-en">Events (English)</th>
        </tr>
      </thead><tbody>`;

    for (const day of month.days) {
      const dayClass = getDayClass(day.dow);
      const rowClass = getRowClass(day);
      const hasEvents = (day.events && day.events.length > 0) || day.holiday || day.closed;

      html += `<tr class="${rowClass}">`;
      html += `<td class="col-date ${dayClass}">${day.d}</td>`;
      html += `<td class="col-day ${dayClass}">${day.dow_jp} / ${day.dow}</td>`;

      if (day.onBreak && (!day.events || day.events.length === 0 || day.events.every(e => e.type === 'break')) && !day.holiday) {
        // Days during a long break with no other events
        const extra = day.closed ? ' / 閉校' : '';
        const extraEn = day.closed ? ' / School Closed' : '';
        html += `<td class="col-jp"><span class="tag tag-closed">休</span> ${day.onBreak.jp}${extra}</td>`;
        html += `<td class="col-en"><span class="tag tag-closed">Break</span> ${day.onBreak.en}${extraEn}</td>`;
      } else if (day.onBreak && day.holiday) {
        // Holiday during a break
        const parts = day.holiday.split(' / ');
        html += `<td class="col-jp"><span class="tag tag-closed">休</span> ${day.onBreak.jp} — ${parts[0]}</td>`;
        html += `<td class="col-en"><span class="tag tag-closed">Break</span> ${day.onBreak.en} — ${parts[1] || parts[0]}</td>`;
      } else if (day.onBreak && day.events && day.events.length > 0) {
        // Break day but with an event (e.g. entrance exam during summer)
        html += `<td class="col-jp"><span class="tag tag-closed">休</span> ${day.onBreak.jp}<br>${renderEvents(day.events.filter(e => e.type !== 'break'), 'jp')}</td>`;
        html += `<td class="col-en"><span class="tag tag-closed">Break</span> ${day.onBreak.en}<br>${renderEvents(day.events.filter(e => e.type !== 'break'), 'en')}</td>`;
      } else if (day.holiday) {
        const parts = day.holiday.split(' / ');
        html += `<td class="col-jp holiday-text">${parts[0]}</td>`;
        html += `<td class="col-en holiday-text">${parts[1] || parts[0]}</td>`;
      } else if (day.closed && (!day.events || day.events.length === 0)) {
        html += `<td class="col-jp"><span class="tag tag-closed">閉校</span> 閉校日</td>`;
        html += `<td class="col-en"><span class="tag tag-closed">Closed</span> School Closed</td>`;
      } else if (day.events && day.events.length > 0) {
        html += `<td class="col-jp">${renderEvents(day.events, 'jp')}</td>`;
        html += `<td class="col-en">${renderEvents(day.events, 'en')}</td>`;
      } else {
        html += `<td class="col-jp no-event">—</td>`;
        html += `<td class="col-en no-event">—</td>`;
      }

      html += `</tr>`;
    }

    html += `</tbody></table></div>`;
  }

  app.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', render);
</script>

<div id="app"></div>

<div class="year-summary">
  <strong>年間登校日数 / Total School Days: 202 (G2/G3: 201)</strong>
</div>

</body>
</html>
